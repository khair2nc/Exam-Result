<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Result Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 15px; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 20px; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; padding: 12px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #resultView { display: none; margin-top: 25px; background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #1a73e8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .btn-inst { display:block; text-align:center; background:#ff9800; color:white; padding:10px; text-decoration:none; border-radius:5px; margin-top:10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Result Search Engine</h2>
    
    <!-- ড্রপডাউন ১: স্কুল/মাদ্রাসা -->
    <select id="type">
        <option value="">প্রতিষ্ঠান ধরন নির্বাচন করুন</option>
        <option value="School">স্কুল (School)</option>
        <option value="Madrasah">মাদ্রাসা (Madrasah)</option>
    </select>

    <!-- ড্রপডাউন ২: পরীক্ষার নাম -->
    <select id="exam">
        <option value="">পরীক্ষার নাম নির্বাচন করুন</option>
        <option value="Annual Exam">Annual Exam</option>
        <option value="Half Yearly">Half Yearly</option>
        <option value="Dakhil Exam">Dakhil Exam</option>
    </select>

    <!-- ড্রপডাউন ৩: বছর -->
    <select id="year">
        <option value="">বছর নির্বাচন করুন</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
    </select>

    <!-- ড্রপডাউন ৪: রেজাল্টের ধরন -->
    <select id="resType" onchange="toggleRollInput()">
        <option value="Individual">ব্যক্তিগত (Individual)</option>
        <option value="Institutional">প্রতিষ্ঠান ভিত্তিক (Full Sheet)</option>
    </select>

    <!-- রোল ইনপুট (শুধু ব্যক্তিগত রেজাল্টের জন্য দেখাবে) -->
    <input type="number" id="roll" placeholder="রোল নম্বর দিন">

    <button onclick="getResult()">Search Result</button>

    <div id="resultView"></div>
</div>

<script>
    function toggleRollInput() {
        const resType = document.getElementById("resType").value;
        const rollInput = document.getElementById("roll");
        rollInput.style.display = (resType === "Individual") ? "block" : "none";
    }

    async function getResult() {
        const type = document.getElementById("type").value;
        const exam = document.getElementById("exam").value;
        const year = document.getElementById("year").value;
        const resType = document.getElementById("resType").value;
        const roll = document.getElementById("roll").value;
        const view = document.getElementById("resultView");

        if(!type || !exam || !year) { alert("সবগুলো ঘর পূরণ করুন!"); return; }

        try {
            const response = await fetch('data.json');
            const data = await response.json();
            
            // ডাটাবেস থেকে সঠিক লোকেশনে পৌঁছানো
            const targetPath = data[type]?.[exam]?.[year];
            if (!targetPath) { alert("দুঃখিত! এই ক্যাটাগরিতে কোনো ডাটা নেই।"); return; }

            if (resType === "Individual") {
                const student = targetPath.Individual.find(s => s.roll == roll);
                if (student) {
                    let table = `<strong>Name:</strong> ${student.name}<br><strong>GPA:</strong> ${student.gpa}<table><tr><th>Subject</th><th>Mark</th></tr>`;
                    for(let s in student.subjects) table += `<tr><td>${s}</td><td>${student.subjects[s]}</td></tr>`;
                    view.innerHTML = table + "</table>";
                } else { alert("রোল পাওয়া যায়নি!"); return; }
            } else {
                // প্রতিষ্ঠানের জন্য ডিরেক্ট লিঙ্ক বা ফাইল দেখানো
                view.innerHTML = `<h4>সম্পূর্ণ রেজাল্ট শিট:</h4><a href="${targetPath.Institutional}" target="_blank" class="btn-inst">PDF ডাউনলোড করুন</a>`;
            }
            view.style.display = "block";
        } catch (e) { alert("Error connecting to Database!"); }
    }
</script>

</body>
</html>
